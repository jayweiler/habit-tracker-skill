# Habit Tracker Configuration
# Generated by habit-tracker skill init
#
# QUICK START: Define your habits below. Each habit needs an id, name,
# and schedule. Everything else is optional. Run the init script or
# ask your AI assistant to "set up habit tracking" for a guided setup.

# =====================================================================
# [REQUIRED] — Set your timezone
# =====================================================================

timezone: "America/Los_Angeles"    # IANA timezone (e.g., "America/New_York", "Europe/London")

# =====================================================================
# [FILE PATHS] — Where data is stored (relative to this config file)
# =====================================================================

log_file: "habit-log.json"                # Active log (recent entries)
log_archive: "habit-log-archive.json"     # Archived entries (older than retention_days)
retention_days: 30                        # Days to keep in active log
issues_file: "skill-issues.md"           # Where skill friction gets logged for later improvement

# =====================================================================
# [HABITS] — Define your habits here
# =====================================================================
#
# Each habit has:
#   id:              Unique key (lowercase, underscores). Used in the JSON log.
#   name:            Human-readable name shown during check-ins.
#   description:     Brief description (optional but helpful).
#   category:        Grouping for check-ins (e.g., "nutrition", "physical", "evening").
#   schedule:        When this habit applies:
#                      "daily"    — Every day
#                      "weekdays" — Mon-Fri
#                      "weekends" — Sat-Sun
#                      "specific" — Only on schedule_days
#   schedule_days:   List of days (only if schedule is "specific"):
#                      ["mon", "tue", "wed", "thu", "fri", "sat", "sun"]
#   threshold_note:  What counts as "done" if it's non-obvious (optional).
#                    Example: "Loading the dishwasher counts, even without running it."
#   active:          true/false. Set to false to pause tracking without deleting.

habits:
  # --- Example: Nutrition ---
  - id: water_morning
    name: "Water in the morning"
    description: "Drink water immediately upon waking"
    category: "nutrition"
    schedule: "daily"
    active: true

  - id: oatmeal_10am
    name: "Oatmeal at 10am"
    description: "Eat oatmeal around 10:00 AM"
    category: "nutrition"
    schedule: "daily"
    active: true

  # --- Example: Physical ---
  - id: pt_knee
    name: "PT exercises"
    description: "Daily physical therapy routine"
    category: "physical"
    schedule: "daily"
    active: true

  # --- Example: Day-specific habit ---
  # - id: include_kid_dinner
  #   name: "Include kid in dinner prep"
  #   description: "Involve child in dinner preparations"
  #   category: "family"
  #   schedule: "specific"
  #   schedule_days: ["wed", "thu"]
  #   active: true

  # --- Example: Evening routine habits ---
  # - id: tidy_kitchen
  #   name: "Tidy kitchen"
  #   description: "Wipe counters, clear sink"
  #   category: "evening"
  #   schedule: "daily"
  #   active: true

  # - id: run_dishwasher
  #   name: "Run dishwasher"
  #   description: "Load and start before bed"
  #   category: "evening"
  #   schedule: "daily"
  #   threshold_note: "Loading it counts, even if you don't run it."
  #   active: true

# =====================================================================
# [ROUTINES] — Group related habits (optional)
# =====================================================================
#
# Routines group habits that belong together (e.g., "evening routine").
# Each habit in a routine is still tracked individually, but routines
# provide grouped check-in and aggregate streak reporting.

routines: []
